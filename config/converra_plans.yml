# Converra workspace plans (UGX per month). Applied via Converra::Billing::ApplyPlanService.
# Seat-based pricing: all plans include full product access; limits are agents + Copilot fair-use.
starter:
  name: Starter
  price_ugx: 0
  limits:
    agents: 1
    captain_responses: 50
    captain_documents: 50

growth:
  name: Growth
  price_ugx: 75000
  annual_price_ugx: 750000
  limits:
    agents: 5
    captain_responses: 500
    captain_documents: 100

business:
  name: Business
  price_ugx: 150000
  annual_price_ugx: 1500000
  limits:
    agents: 15
    captain_responses: 2000
    captain_documents: 500
